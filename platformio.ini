[env:esp32-s3-devkitc-1]
platform = espressif32@6.4.0
board = esp32-s3-devkitc-1
framework = arduino

; Board Configuration for N16R8 (16MB Flash, 8MB PSRAM)
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_upload.flash_size = 16MB

; CPU Frequency
board_build.f_cpu = 240000000L

monitor_speed = 115200
upload_port = COM14
monitor_port = COM14

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    adafruit/Adafruit TouchScreen @ ^1.1.5
    mobizt/Firebase ESP32 Client@^4.4.8
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0.4
    arduino-libraries/Ethernet @ ^2.0.2

build_flags = 
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    ; TFT_eSPI S3 Parallel Configuration
    -D USER_SETUP_LOADED=1
    -D ESP32_S3_PARALLEL=1
    -D TFT_PARALLEL_8_BIT=1
    -D ILI9488_DRIVER=1
    -D TFT_WIDTH=320
    -D TFT_HEIGHT=480
    -D TFT_CS=17
    -D TFT_DC=16
    -D TFT_RST=48
    -D TFT_WR=15
    -D TFT_RD=14
    -D TFT_D0=1
    -D TFT_D1=2
    -D TFT_D2=3
    -D TFT_D3=4
    -D TFT_D4=5
    -D TFT_D5=6
    -D TFT_D6=7
    -D TFT_D7=8
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_FONT8=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
